<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Espace Client</title>
</head>

<body>
    <div class="commande-box">
        <h1>Espace Client</h1>
        <a href="/">Se déconnecter</a>

        <h3>Mes produits achetés</h3>
        <table border="1">
            <tr>
                <th>Produit</th>
                <th>Prix</th>
                <th>Quantité</th>
            </tr>
            {% for p in produits %}
            <tr>
                <td>{{ p.nom }}</td>
                <td>{{ p.prix }} €</td>
                <td>{{ p.quantite }}</td>
            </tr>
            {% endfor %}
        </table>

        <div style="margin-top: 20px;">
            <a href="/client/{{ id_client }}/commander" class="btn">Passer une nouvelle commande</a>
            <br><br>
            <a href="{{ url_for('voir_panier', id_client=id_client) }}" class="btn">Voir mon Panier</a>
        </div>
    </div>
</body>

</html>
